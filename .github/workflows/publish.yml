name: Publish to PyPI

# Publishes to PyPI when you create a GitHub Release. Uses PyPI Trusted
# Publishing (OIDC) — no API token or secret is stored in the repo.
#
# One-time PyPI setup (https://pypi.org/manage/account/publishing/):
#   PyPI project : octopus-linkedin
#   Owner        : octoryn
#   Repository   : octopus-linkedin
#   Workflow     : publish.yml
#   Environment  : pypi

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check
        run: |
          python -m pip install --upgrade twine
          twine check dist/*
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
