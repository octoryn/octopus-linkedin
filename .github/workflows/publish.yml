name: Release

# Publishes to PyPI when a version tag (e.g. v0.2.1) is pushed. Uses PyPI
# Trusted Publishing (OIDC) — no API token or secret is stored in the repo.
# The tag must match the version in pyproject.toml, and the full lint/format/
# test suite must pass before anything is published.
#
# NOTE: the filename must stay `publish.yml` — the PyPI trusted-publisher config
# references it. One-time PyPI setup
# (https://pypi.org/manage/account/publishing/):
#   Project: octopus-linkedin · Owner: octoryn · Repo: octopus-linkedin
#   Workflow: publish.yml · Environment: pypi

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip build twine
          pip install -e ".[dev]"

      - name: Verify tag matches version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG"
            exit 1
          fi
          echo "Publishing version $PKG"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test
        run: pytest -q

      - name: Build
        run: python -m build

      - name: Check
        run: twine check dist/*

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
